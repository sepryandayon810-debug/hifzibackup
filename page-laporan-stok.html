<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>WebPOS - Laporan Stok</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <!-- CSS akan mengikuti struktur page-laporan.html Anda -->
  <style>
/* ===== THEME & BASE ===== */
:root{--primary:#6366f1;--primary-dark:#4f46e5;--secondary:#ec4899;--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--bg-primary:#f8fafc;--bg-secondary:#f1f5f9;--bg-card:#fff;--text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--border-color:#e2e8f0;--shadow-lg:0 10px 15px rgba(0,0,0,0.1);--radius-xl:1rem;--sidebar-width:280px;--header-height:70px;--bottom-nav-height:70px}
[data-theme="dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#1e293b;--text-primary:#f8fafc;--text-secondary:#cbd5e1;--text-muted:#64748b;--border-color:#334155}
*{margin:0;padding:0;box-sizing:border-box}
html{font-family:'Inter',sans-serif}
body{background:var(--bg-primary);color:var(--text-primary);line-height:1.6;min-height:100vh}

/* Layout */
.app-container{display:flex;min-height:100vh}
.main-content{flex:1;margin-left:var(--sidebar-width);min-height:100vh;display:flex;flex-direction:column}
@media(max-width:1024px){.main-content{margin-left:0}}

/* Header */
.main-header{height:var(--header-height);background:var(--bg-card);border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:1rem}
.header-title{font-size:1.35rem;font-weight:700}
.btn-icon{width:40px;height:40px;border:none;border-radius:.75rem;background:var(--bg-secondary);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer}

/* Page Content */
.page-content{flex:1;padding:1.5rem;overflow-y:auto}
@media(max-width:768px){.page-content{padding:1rem;padding-bottom:calc(var(--bottom-nav-height) + 1rem)}}

/* Cards */
.card{background:var(--bg-card);border-radius:var(--radius-xl);border:1px solid var(--border-color);overflow:hidden;margin-bottom:1.5rem}
.card-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.card-title{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.card-body{padding:1.5rem}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg-card);border-radius:var(--radius-xl);border:1px solid var(--border-color);padding:1.25rem;display:flex;align-items:center;gap:1rem}
.stat-icon{width:48px;height:48px;border-radius:.75rem;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.stat-icon.blue{background:rgba(99,102,241,.1);color:var(--primary)}
.stat-icon.green{background:rgba(16,185,129,.1);color:var(--success)}
.stat-icon.orange{background:rgba(245,158,11,.1);color:var(--warning)}
.stat-icon.red{background:rgba(239,68,68,.1);color:var(--danger)}
.stat-label{font-size:.75rem;color:var(--text-muted);margin-bottom:.25rem;text-transform:uppercase}
.stat-value{font-size:1.5rem;font-weight:700}

/* Toolbar */
.toolbar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:250px;position:relative}
.search-box i{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-box input{width:100%;padding:.75rem 1rem .75rem 2.5rem;border:1px solid var(--border-color);border-radius:.75rem;background:var(--bg-card);font-size:.875rem}

/* Table */
.table-container{overflow-x:auto;border:1px solid var(--border-color);border-radius:.75rem}
.data-table{width:100%;border-collapse:collapse;font-size:.875rem}
.data-table th,.data-table td{padding:1rem;text-align:left;border-bottom:1px solid var(--border-color)}
.data-table th{background:var(--bg-secondary);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--text-secondary)}
.data-table tr:hover{background:rgba(99,102,241,.02)}
.data-table td{vertical-align:middle}
.stock-low{color:var(--danger);font-weight:600}
.stock-ok{color:var(--success);font-weight:600}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:.35rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:600}
.badge-success{background:rgba(16,185,129,.1);color:var(--success)}
.badge-warning{background:rgba(245,158,11,.1);color:var(--warning)}
.badge-danger{background:rgba(239,68,68,.1);color:var(--danger)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:.5rem;padding:.625rem 1.25rem;border-radius:.75rem;font-size:.875rem;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--primary);color:white}
.btn-secondary{background:var(--bg-secondary);color:var(--text-secondary);border:1px solid var(--border-color)}
.btn-sm{padding:.4rem .875rem;font-size:.8rem}

/* Forms */
.form-select{padding:.75rem 1rem;border:1px solid var(--border-color);border-radius:.75rem;background:var(--bg-card);font-size:.875rem;min-width:150px}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:2000;opacity:0;visibility:hidden;transition:all .25s;padding:1rem}
.modal-overlay.active{opacity:1;visibility:visible}
.modal{background:var(--bg-card);border-radius:var(--radius-xl);width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:1.25rem;font-weight:700}
.modal-close{width:36px;height:36px;border:none;border-radius:.75rem;background:var(--bg-secondary);color:var(--text-muted);cursor:pointer}
.modal-body{padding:1.5rem}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border-color);display:flex;gap:.75rem;justify-content:flex-end}

/* Action Buttons */
.action-btns{display:flex;gap:.5rem}
.btn-action{width:32px;height:32px;border:none;border-radius:.5rem;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.875rem;background:rgba(99,102,241,.1);color:var(--primary)}
.btn-action:hover{background:var(--primary);color:white}

/* Mobile Nav */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-height);background:var(--bg-card);border-top:1px solid var(--border-color);z-index:999}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.25rem;color:var(--text-muted);text-decoration:none;font-size:.7rem}
.mobile-nav-item.active{color:var(--primary)}
@media(max-width:768px){.mobile-nav{display:flex}}

/* Toast */
.toast-container{position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem}
.toast{display:flex;align-items:center;gap:1rem;padding:1rem 1.5rem;background:var(--bg-card);border-radius:.75rem;box-shadow:var(--shadow-lg);border-left:4px solid;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-left-color:var(--success)}
.toast.error{border-left-color:var(--danger)}

/* Loading */
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;z-index:9998;opacity:0;visibility:hidden}
.loading-overlay.active{opacity:1;visibility:visible}
.spinner{width:48px;height:48px;border:4px solid var(--border-color);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Adjustment Preview Box */
.adjustment-preview{background:var(--bg-secondary);padding:1rem;border-radius:.75rem;margin-top:1rem}
.adjustment-row{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.9rem}
.adjustment-row:last-child{margin-bottom:0;padding-top:.5rem;border-top:1px solid var(--border-color);font-weight:600}

/* Responsive */
@media(max-width:768px){
  .card-header{flex-direction:column;align-items:flex-start}
  .toolbar{flex-direction:column}
  .search-box{min-width:100%}
  .action-btns{flex-direction:row}
  .hide-mobile{display:none}
}
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar akan di-render oleh nav-config.js -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="btn-icon d-md-none" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="header-title">Laporan Stok</h1>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="btnTheme" title="Toggle Theme"><i class="fas fa-moon"></i></button>
          <button class="btn-icon" id="btnExport" title="Export CSV"><i class="fas fa-file-csv"></i></button>
        </div>
      </header>

      <div class="page-content">
        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue"><i class="fas fa-boxes"></i></div>
            <div class="stat-info">
              <div class="stat-label">Total Produk</div>
              <div class="stat-value" id="totalProduk">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
            <div class="stat-info">
              <div class="stat-label">Stok Aman</div>
              <div class="stat-value" id="stokAman">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon orange"><i class="fas fa-exclamation-triangle"></i></div>
            <div class="stat-info">
              <div class="stat-label">Stok Rendah</div>
              <div class="stat-value" id="stokRendah">0</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
            <div class="stat-info">
              <div class="stat-label">Stok Habis</div>
              <div class="stat-value" id="stokHabis">0</div>
            </div>
          </div>
        </div>

        <!-- Main Card -->
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-warehouse"></i> Daftar Stok Produk</div>
            <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
              <select class="form-select" id="filterKategori">
                <option value="all">Semua Kategori</option>
              </select>
              <select class="form-select" id="filterStatus">
                <option value="all">Semua Status</option>
                <option value="low">Stok Rendah (≤5)</option>
                <option value="empty">Stok Habis</option>
                <option value="ok">Stok Aman (>5)</option>
              </select>
            </div>
          </div>
          
          <div class="card-body">
            <div class="toolbar">
              <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchProduk" placeholder="Cari nama produk...">
              </div>
              <button class="btn btn-primary" onclick="openAdjustmentModal()">
                <i class="fas fa-edit"></i> Penyesuaian Stok
              </button>
            </div>

            <div class="table-container">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Produk</th>
                    <th>Kategori</th>
                    <th class="text-center">Stok</th>
                    <th class="hide-mobile">Satuan</th>
                    <th>Status</th>
                    <th class="text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody id="stockTableBody">
                  <tr>
                    <td colspan="6" style="text-align:center;padding:3rem;color:var(--text-muted);">
                      <i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:1rem;"></i>
                      Memuat data stok...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-nav">
      <a href="index.html" class="mobile-nav-item"><i class="fas fa-home"></i>Dashboard</a>
      <a href="page-kasir.html" class="mobile-nav-item"><i class="fas fa-cash-register"></i>Kasir</a>
      <a href="page-produk.html" class="mobile-nav-item"><i class="fas fa-box"></i>Produk</a>
      <a href="page-riwayat.html" class="mobile-nav-item"><i class="fas fa-history"></i>Riwayat</a>
      <a href="page-setting.html" class="mobile-nav-item"><i class="fas fa-cog"></i>Setting</a>
    </nav>
  </div>

  <!-- Adjustment Modal -->
  <div class="modal-overlay" id="adjustmentModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-edit"></i> Penyesuaian Stok</h3>
        <button class="modal-close" onclick="closeAdjustmentModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <div class="form-group" style="margin-bottom:1rem;">
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem;">Pilih Produk</label>
          <select class="form-select" id="adjProduct" style="width:100%;">
            <option value="">-- Pilih Produk --</option>
          </select>
        </div>
        
        <div class="form-group" style="margin-bottom:1rem;">
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem;">Tipe Penyesuaian</label>
          <select class="form-select" id="adjType" style="width:100%;">
            <option value="in">Stok Masuk (Penambahan)</option>
            <option value="out">Stok Keluar (Pengurangan)</option>
            <option value="adjust">Penyesuaian Absolute (Set Ulang)</option>
          </select>
        </div>
        
        <div class="form-group" style="margin-bottom:1rem;">
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem;">Jumlah</label>
          <input type="number" id="adjQty" class="form-select" style="width:100%;" placeholder="0" min="0">
        </div>
        
        <div class="form-group" style="margin-bottom:1rem;">
          <label style="display:block;font-size:.875rem;font-weight:500;margin-bottom:.5rem;">Catatan / Alasan</label>
          <input type="text" id="adjNote" class="form-select" style="width:100%;" placeholder="Contoh: Rusak, Hilang, Opname, dll">
        </div>

        <div class="adjustment-preview" id="adjPreview" style="display:none;">
          <div class="adjustment-row">
            <span>Stok Saat Ini:</span>
            <strong id="currentStock">0</strong>
          </div>
          <div class="adjustment-row">
            <span>Perubahan:</span>
            <strong id="changeStock" style="color:var(--primary);">+0</strong>
          </div>
          <div class="adjustment-row">
            <span>Stok Setelahnya:</span>
            <strong id="newStock" style="color:var(--success);">0</strong>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeAdjustmentModal()">Batal</button>
        <button class="btn btn-primary" onclick="saveAdjustment()"><i class="fas fa-save"></i> Simpan</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div class="modal-overlay" id="historyModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 class="modal-title"><i class="fas fa-history"></i> Riwayat Perubahan</h3>
        <button class="modal-close" onclick="closeHistoryModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" id="historyContent" style="max-height:60vh;overflow-y:auto;">
        <!-- Dynamic content -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeHistoryModal()">Tutup</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toastContainer"></div>
  
  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <!-- Scripts -->
  <script type="module">
    import { MENU_CONFIG } from '../js/nav-config.js';
    
    // Render Sidebar dari nav-config
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      let html = `
        <div class="sidebar-header">
          <div class="logo-container">
            <div class="logo-icon"><i class="fas fa-cash-register"></i></div>
            <span class="logo-text">WebPOS</span>
          </div>
        </div>
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-chevron-left"></i></button>
        <div class="sidebar-search">
          <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" class="search-input" id="menuSearch" placeholder="Cari menu...">
          </div>
        </div>
        <nav class="sidebar-nav">
      `;
      
      let currentSection = '';
      MENU_CONFIG.menu.forEach(item => {
        if (item.type === 'divider') {
          if (currentSection) html += '</ul></div>';
          html += `<div class="nav-section"><div class="nav-section-title">${item.label}</div><ul class="nav-menu">`;
          currentSection = item.label;
        } else {
          const isActive = item.id === 'laporan-stok';
          const hasSubmenu = item.submenu && item.submenu.length > 0;
          
          if (hasSubmenu) {
            const subActive = item.submenu.some(s => s.id === 'laporan-stok');
            html += `
              <li class="nav-item nav-dropdown ${subActive ? 'open' : ''}" id="dropdown-${item.id}">
                <div class="nav-link nav-dropdown-toggle" onclick="toggleDropdown('dropdown-${item.id}')">
                  <div style="display:flex;align-items:center;gap:0.75rem;">
                    <i class="fas ${item.icon}"></i>
                    <span>${item.label}</span>
                  </div>
                  <i class="fas fa-chevron-down dropdown-arrow"></i>
                </div>
                <ul class="nav-submenu">
                  ${item.submenu.map(sub => `
                    <li><a href="${sub.href}" class="nav-link ${sub.id === 'laporan-stok' ? 'active' : ''}"><span>${sub.label}</span></a></li>
                  `).join('')}
                </ul>
              </li>
            `;
          } else {
            html += `
              <li class="nav-item">
                <a href="${item.href}" class="nav-link ${isActive ? 'active' : ''}" data-menu="${item.id}">
                  <i class="fas ${item.icon}"></i>
                  <span>${item.label}</span>
                </a>
              </li>
            `;
          }
        }
      });
      
      html += `</ul></div></nav>
        <div class="sidebar-footer">
          <div class="user-profile" id="userProfile">
            <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
            <div class="user-info">
              <div class="user-name" id="userName">Loading...</div>
              <div class="user-role" id="userRole">-</div>
            </div>
          </div>
        </div>
      `;
      
      sidebar.innerHTML = html;
      
      // Re-attach event listeners
      document.getElementById('menuToggle').addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
      });
      
      document.getElementById('mobileMenuToggle').addEventListener('click', () => {
        sidebar.classList.toggle('mobile-open');
      });
    }

    // Global functions for onclick handlers
    window.toggleDropdown = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const isOpen = el.classList.contains('open');
      document.querySelectorAll('.nav-dropdown.open').forEach(d => d.classList.remove('open'));
      if (!isOpen) el.classList.add('open');
    };

    window.openAdjustmentModal = function(productId = null) {
      document.getElementById('adjustmentModal').classList.add('active');
      document.getElementById('adjProduct').value = productId || '';
      document.getElementById('adjType').value = 'in';
      document.getElementById('adjQty').value = '';
      document.getElementById('adjNote').value = '';
      document.getElementById('adjPreview').style.display = 'none';
      if (productId) updatePreview();
    };

    window.closeAdjustmentModal = function() {
      document.getElementById('adjustmentModal').classList.remove('active');
    };

    window.closeHistoryModal = function() {
      document.getElementById('historyModal').classList.remove('active');
    };

    window.showHistory = async function(productId) {
      const modal = document.getElementById('historyModal');
      const content = document.getElementById('historyContent');
      const product = products.find(p => p.id === productId);
      
      content.innerHTML = '<div style="text-align:center;padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Memuat...</div>';
      modal.classList.add('active');
      
      try {
        const snap = await firebase.database().ref('stock_adjustments')
          .orderByChild('productId')
          .equalTo(productId)
          .limitToLast(20)
          .once('value');
        
        const data = snap.val() || {};
        const items = Object.entries(data).map(([key, val]) => ({id: key, ...val})).sort((a,b) => b.timestamp - a.timestamp);
        
        if (items.length === 0) {
          content.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);">Belum ada riwayat perubahan</div>';
          return;
        }
        
        content.innerHTML = items.map(item => {
          const date = new Date(item.timestamp).toLocaleString('id-ID');
          const typeClass = item.type === 'in' ? 'badge-success' : item.type === 'out' ? 'badge-danger' : 'badge-warning';
          const typeText = item.type === 'in' ? 'Masuk' : item.type === 'out' ? 'Keluar' : 'Adjust';
          return `
            <div style="padding:1rem;border:1px solid var(--border-color);border-radius:.5rem;margin-bottom:.5rem;background:var(--bg-secondary);">
              <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;">
                <span class="badge ${typeClass}">${typeText} ${item.quantity}</span>
                <span style="font-size:.8rem;color:var(--text-muted);">${date}</span>
              </div>
              <div style="font-size:.85rem;margin-bottom:.25rem;">
                <i class="fas fa-exchange-alt"></i> ${item.previousStock} → ${item.newStock}
              </div>
              ${item.note ? `<div style="font-size:.8rem;color:var(--text-muted);"><i class="fas fa-comment"></i> ${item.note}</div>` : ''}
              <div style="font-size:.75rem;color:var(--text-muted);margin-top:.5rem;">Oleh: ${item.user || 'System'}</div>
            </div>
          `;
        }).join('');
      } catch(e) {
        content.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--danger);">Gagal memuat riwayat</div>';
      }
    };

    window.saveAdjustment = async function() {
      const productId = document.getElementById('adjProduct').value;
      const type = document.getElementById('adjType').value;
      const qty = parseInt(document.getElementById('adjQty').value);
      const note = document.getElementById('adjNote').value.trim();
      
      if (!productId) { showToast('Pilih produk terlebih dahulu', 'error'); return; }
      if (!qty || qty < 0) { showToast('Jumlah tidak valid', 'error'); return; }
      
      const product = products.find(p => p.id === productId);
      const current = product.stock || 0;
      let newStock = current;
      
      if (type === 'in') newStock = current + qty;
      else if (type === 'out') newStock = Math.max(0, current - qty);
      else if (type === 'adjust') newStock = qty;
      
      try {
        document.getElementById('loadingOverlay').classList.add('active');
        
        await firebase.database().ref('stock_adjustments').push({
          productId, productName: product.name, type, quantity: qty,
          previousStock: current, newStock, note: note || '-',
          timestamp: Date.now(), user: document.getElementById('userName').textContent
        });
        
        await firebase.database().ref(`products/${productId}`).update({stock: newStock});
        
        showToast('Penyesuaian stok berhasil', 'success');
        closeAdjustmentModal();
        loadData();
      } catch(e) {
        showToast('Gagal menyimpan: ' + e.message, 'error');
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
      }
    };

    // Utilities
    function showToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'times-circle'}"></i><span>${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Data State
    let products = [];
    let categories = [];

    async function loadData() {
      try {
        document.getElementById('loadingOverlay').classList.add('active');
        
        const [prodSnap, catSnap] = await Promise.all([
          firebase.database().ref('products').once('value'),
          firebase.database().ref('categories').once('value')
        ]);
        
        const prodData = prodSnap.val() || {};
        products = Object.entries(prodData).map(([id, d]) => ({id, ...d}));
        
        const catData = catSnap.val() || {};
        categories = Object.entries(catData).map(([id, d]) => ({id, ...d}));
        
        updateStats();
        renderTable();
        renderFilters();
      } catch(e) {
        showToast('Gagal memuat data', 'error');
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
      }
    }

    function updateStats() {
      const total = products.length;
      const low = products.filter(p => p.stock > 0 && p.stock <= 5).length;
      const empty = products.filter(p => !p.stock || p.stock === 0).length;
      const ok = products.filter(p => p.stock > 5).length;
      
      document.getElementById('totalProduk').textContent = total;
      document.getElementById('stokAman').textContent = ok;
      document.getElementById('stokRendah').textContent = low;
      document.getElementById('stokHabis').textContent = empty;
    }

    function renderTable() {
      const tbody = document.getElementById('stockTableBody');
      const search = document.getElementById('searchProduk').value.toLowerCase();
      const catFilter = document.getElementById('filterKategori').value;
      const statusFilter = document.getElementById('filterStatus').value;
      
      let filtered = products.filter(p => {
        const matchSearch = p.name.toLowerCase().includes(search);
        const matchCat = catFilter === 'all' || p.categoryId === catFilter;
        
        let matchStatus = true;
        if (statusFilter === 'low') matchStatus = p.stock > 0 && p.stock <= 5;
        else if (statusFilter === 'empty') matchStatus = !p.stock || p.stock === 0;
        else if (statusFilter === 'ok') matchStatus = p.stock > 5;
        
        return matchSearch && matchCat && matchStatus;
      });
      
      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:3rem;color:var(--text-muted);"><i class="fas fa-box-open" style="font-size:2rem;display:block;margin-bottom:1rem;"></i>Tidak ada data</td></tr>`;
        return;
      }
      
      tbody.innerHTML = filtered.map(p => {
        const cat = categories.find(c => c.id === p.categoryId);
        let statusBadge = '';
        let stockClass = '';
        
        if (!p.stock || p.stock === 0) {
          statusBadge = '<span class="badge badge-danger">Habis</span>';
          stockClass = 'stock-low';
        } else if (p.stock <= 5) {
          statusBadge = '<span class="badge badge-warning">Rendah</span>';
          stockClass = 'stock-low';
        } else {
          statusBadge = '<span class="badge badge-success">Aman</span>';
          stockClass = 'stock-ok';
        }
        
        return `
          <tr>
            <td>
              <div style="font-weight:600;">${p.name}</div>
              <div style="font-size:.8rem;color:var(--text-muted);">${p.code || '-'}</div>
            </td>
            <td>${cat ? cat.name : '-'}</td>
            <td class="text-center ${stockClass}" style="font-size:1.1rem;">${p.stock || 0}</td>
            <td class="hide-mobile">${p.unit || 'pcs'}</td>
            <td>${statusBadge}</td>
            <td class="text-center">
              <div class="action-btns" style="justify-content:center;">
                <button class="btn-action" onclick="openAdjustmentModal('${p.id}')" title="Adjust"><i class="fas fa-edit"></i></button>
                <button class="btn-action" onclick="showHistory('${p.id}')" title="History"><i class="fas fa-history"></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderFilters() {
      const catSelect = document.getElementById('filterKategori');
      catSelect.innerHTML = '<option value="all">Semua Kategori</option>' + 
        categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      
      const prodSelect = document.getElementById('adjProduct');
      prodSelect.innerHTML = '<option value="">-- Pilih Produk --</option>' + 
        products.map(p => `<option value="${p.id}">${p.name} (Stok: ${p.stock || 0})</option>`).join('');
    }

    function updatePreview() {
      const pid = document.getElementById('adjProduct').value;
      const type = document.getElementById('adjType').value;
      const qty = parseInt(document.getElementById('adjQty').value) || 0;
      
      if (!pid) {
        document.getElementById('adjPreview').style.display = 'none';
        return;
      }
      
      const prod = products.find(p => p.id === pid);
      const current = prod.stock || 0;
      let newStock = current;
      let change = 0;
      
      if (type === 'in') { newStock = current + qty; change = qty; }
      else if (type === 'out') { newStock = Math.max(0, current - qty); change = -qty; }
      else { newStock = qty; change = qty - current; }
      
      document.getElementById('currentStock').textContent = current;
      document.getElementById('newStock').textContent = newStock;
      const changeEl = document.getElementById('changeStock');
      changeEl.textContent = (change >= 0 ? '+' : '') + change;
      changeEl.style.color = change > 0 ? 'var(--success)' : change < 0 ? 'var(--danger)' : 'var(--text-muted)';
      
      document.getElementById('adjPreview').style.display = 'block';
    }

    // Event Listeners
    document.getElementById('searchProduk').addEventListener('input', renderTable);
    document.getElementById('filterKategori').addEventListener('change', renderTable);
    document.getElementById('filterStatus').addEventListener('change', renderTable);
    document.getElementById('adjProduct').addEventListener('change', updatePreview);
    document.getElementById('adjType').addEventListener('change', updatePreview);
    document.getElementById('adjQty').addEventListener('input', updatePreview);
    
    document.getElementById('btnTheme').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('webpos_theme', next);
    });

    document.getElementById('btnExport').addEventListener('click', () => {
      let csv = 'Nama Produk,Kategori,Stok,Satuan,Status\n';
      products.forEach(p => {
        const cat = categories.find(c => c.id === p.categoryId);
        let status = 'Aman';
        if (!p.stock || p.stock === 0) status = 'Habis';
        else if (p.stock <= 5) status = 'Rendah';
        csv += `"${p.name}","${cat ? cat.name : '-'}",${p.stock || 0},"${p.unit || 'pcs'}","${status}"\n`;
      });
      
      const blob = new Blob([csv], {type:'text/csv'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `stok-${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      showToast('File CSV berhasil diunduh', 'success');
    });

    // Init
    renderSidebar();
    
    // Load saved theme
    const savedTheme = localStorage.getItem('webpos_theme');
    if (savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);
    
    // Auth & Data
    firebase.auth().onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      firebase.database().ref('users/' + user.uid).once('value').then(snap => {
        const data = snap.val() || {};
        document.getElementById('userName').textContent = data.name || user.email;
        document.getElementById('userRole').textContent = data.role || 'Kasir';
      });
      loadData();
    });
  </script>
</body>
</html>
